name: Distribute iOS to Firebase

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes shown to Firebase testers
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-firebase-distribution-develop
  cancel-in-progress: false

jobs:
  distribute:
    name: Build and distribute
    runs-on: macos-latest
    timeout-minutes: 60
    environment: firebase-distribution

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Configure signing repository access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install iOS dependencies
        working-directory: ios
        run: bundle exec pod install --deployment

      - name: Create Firebase credentials file
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_BASE64" | base64 -D > "$RUNNER_TEMP/firebase-service-account.json"
          test -s "$RUNNER_TEMP/firebase-service-account.json"

      - name: Build and distribute
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_FILE: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS || 'internal-testers' }}
          RELEASE_NOTES: ${{ inputs.release_notes || format('Build {0} ({1})', github.run_number, github.sha) }}
        run: bundle exec fastlane ios distribute

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: cocarr-ios-adhoc-${{ github.run_number }}
          path: build/cocarrApp.ipa
          if-no-files-found: error
          retention-days: 14
