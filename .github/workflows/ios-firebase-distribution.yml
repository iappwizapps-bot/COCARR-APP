name: Distribute iOS to Firebase

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes shown to Firebase testers
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-firebase-distribution-develop
  cancel-in-progress: false

jobs:
  distribute:
    name: Build and distribute
    runs-on: macos-latest
    timeout-minutes: 60
    environment: firebase-distribution

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install iOS dependencies
        working-directory: ios
        run: bundle exec pod install --deployment

      - name: Create Firebase credentials file
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_BASE64" | base64 -D > "$RUNNER_TEMP/firebase-service-account.json"
          test -s "$RUNNER_TEMP/firebase-service-account.json"

      - name: Build and distribute
        env:
          CI: 'true'
          FASTLANE_DONT_STORE_PASSWORD: '1'
          FASTLANE_SKIP_UPDATE_CHECK: '1'
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          APP_IDENTIFIER: com.iappwiz.cocarr
          FIREBASE_SERVICE_ACCOUNT_FILE: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS || 'internal-testers' }}
          RELEASE_NOTES: ${{ inputs.release_notes || format('Build {0} ({1})', github.run_number, github.sha) }}
        run: bundle exec fastlane ios distribute --non-interactive

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: cocarr-ios-adhoc-${{ github.run_number }}
          path: build/cocarrApp.ipa
          if-no-files-found: error
          retention-days: 14
