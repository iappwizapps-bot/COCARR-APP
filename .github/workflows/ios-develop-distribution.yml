name: React Native iOS CI

on:
  push:
    branches:
      - develop

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node Modules
        run: npm ci

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios
        run: |
          pod install --repo-update

      - name: Archive App
        run: |
          set -eo pipefail

          xcodebuild archive \
            -workspace ios/cocarrApp.xcworkspace \
            -scheme cocarrApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/cocarrApp.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        run: |
          set -eo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath build/cocarrApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      - name: Verify Export
        run: |
          ls -la build
          test -f build/cocarrApp.ipa

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute \
            build/cocarrApp.ipa \
            --app "${{ env.FIREBASE_APP_ID }}" \
            --groups "developers" \
            --release-notes "GitHub Actions Build #${{ github.run_number }}" \
            --token "${{ env.FIREBASE_TOKEN }}"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocarrApp-${{ github.run_number }}
          path: build/cocarrApp.ipa
          if-no-files-found: error
