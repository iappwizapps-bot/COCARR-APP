name: iOS · Distribute to Firebase

# Archives, signs and exports an IPA, then ships it to Firebase App Distribution
# only when a pull request is merged into develop (or on manual dispatch).
on:
  pull_request:
    types: [closed]
    branches:
      - develop
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes shown to Firebase testers
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-distribute-${{ github.ref }}
  cancel-in-progress: false

jobs:
  distribute:
    name: Build & distribute iOS
    # Only run for a merged PR (skip PRs that are closed without merging).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: macos-14
    timeout-minutes: 75
    environment: firebase-distribution
    env:
      # Firebase App ID for the iOS app (project cocarr-front-end). Not secret.
      FIREBASE_IOS_APP_ID: '1:265614983806:ios:9331015ce8707a7afcce2f'
      FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS || 'internal-testers' }}
      WORKSPACE: ios/cocarrApp.xcworkspace
      SCHEME: cocarrApp
      BUNDLE_ID: com.iappwiz.cocarr

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install CocoaPods
        working-directory: ios
        run: |
          gem install cocoapods -v 1.15.2 --no-document
          pod install

      - name: Import signing certificate & provisioning profile
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 -d > "$CERT_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          # Create an ephemeral keychain and import the distribution identity
          # (certificate AND private key). Do NOT pass "-t cert": that imports
          # only the certificate and drops the private key, which makes export
          # fail with "No signing certificate ... with a private key".
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" \
            -A -f pkcs12 -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild

          # Import the Apple WWDR intermediate certificates so the distribution
          # cert's chain validates in this ephemeral keychain. Without them the
          # identity imports but is reported as "0 valid identities" and export
          # fails with "No signing certificate ... with a private key".
          for CA in AppleWWDRCAG3 AppleWWDRCAG6 AppleWWDRCAG8; do
            if curl -fsSL -o "$RUNNER_TEMP/$CA.cer" "https://www.apple.com/certificateauthority/$CA.cer"; then
              security import "$RUNNER_TEMP/$CA.cer" -k "$KEYCHAIN_PATH" || true
            fi
          done

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          # Keep the runner's existing keychains (login/system, which hold Apple
          # root CAs) in the search list and add ours; make ours the default.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Sanity check: there must be at least one valid signing identity.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -qE '[1-9][0-9]* valid identities'

          # Install the provisioning profile.
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive (unsigned; signed at export)
        env:
          # Build number, incremented on every develop merge.
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          # Build the archive without signing so that library/Pods targets
          # (ReactCommon, Yoga, …) don't get the app's provisioning profile
          # forced on them. The app is signed during -exportArchive instead.
          # CURRENT_PROJECT_VERSION becomes CFBundleVersion (the build number).
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/cocarrApp.xcarchive" \
            -destination 'generic/platform=iOS' \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Export IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/cocarrApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Distribute to Firebase App Distribution
        env:
          # firebase-tools reads FIREBASE_TOKEN automatically for auth, so no
          # service-account file is needed here.
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes || format('develop build {0} ({1})', github.run_number, github.sha) }}
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -n 1)"
          test -n "$IPA_PATH"
          npx --yes firebase-tools@13 appdistribution:distribute \
            "$IPA_PATH" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "developers" \
            --release-notes "$RELEASE_NOTES"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocarr-ios-adhoc-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14
