name: iOS · Distribute to Firebase

# Archives, signs and exports an IPA, then ships it to Firebase App Distribution
# whenever code lands on develop (direct push or a merged PR), or on manual dispatch.
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      release_notes:
        description: Notes shown to Firebase testers
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-distribute-${{ github.ref }}
  cancel-in-progress: false

jobs:
  distribute:
    name: Build & distribute iOS
    runs-on: macos-14
    timeout-minutes: 75
    environment: firebase-distribution
    env:
      # Firebase App ID for the iOS app (project cocarr-front-end). Not secret.
      FIREBASE_IOS_APP_ID: '1:265614983806:ios:9331015ce8707a7afcce2f'
      FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS || 'internal-testers' }}
      WORKSPACE: ios/cocarrApp.xcworkspace
      SCHEME: cocarrApp
      BUNDLE_ID: com.iappwiz.cocarr

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install CocoaPods
        working-directory: ios
        run: |
          gem install cocoapods -v 1.15.2 --no-document
          pod install

      - name: Import signing certificate & provisioning profile
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 -d > "$CERT_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          # Create an ephemeral keychain and import the distribution certificate.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install the provisioning profile.
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive (unsigned; signed at export)
        run: |
          set -euo pipefail
          # Build the archive without signing so that library/Pods targets
          # (ReactCommon, Yoga, …) don't get the app's provisioning profile
          # forced on them. The app is signed during -exportArchive instead.
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/cocarrApp.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Export IPA
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/cocarrApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          test -s "$RUNNER_TEMP/firebase-sa.json"

      - name: Distribute to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          RELEASE_NOTES: ${{ inputs.release_notes || format('develop build {0} ({1})', github.run_number, github.sha) }}
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -n 1)"
          test -n "$IPA_PATH"
          npx --yes firebase-tools@13 appdistribution:distribute \
            "$IPA_PATH" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "$FIREBASE_TESTER_GROUPS" \
            --release-notes "$RELEASE_NOTES"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocarr-ios-adhoc-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14
